name: flutter_piano
description: A Cross platform Midi Piano built with Flutter.
maintainer: Rody Davis Jr <rody.davis.jr@gmail.com>
homepage: https://github.com/rodydavis/flutter_piano
version: 2.0.0+501
publish_to: none
environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_hooks: ^0.21.2
  get_it: ^8.0.2
  injectable: ^2.5.0
  go_router: ^14.7.2
  recase: ^4.1.0
  shared_preferences: ^2.3.2
  intl: any
  country_flags: ^3.0.0
  shadcn_ui: ^0.53.5
  url_launcher: ^6.3.1
  dart_melty_soundfont: ^2.0.0
  flutter_pcm_sound: ^3.3.3
  web: ^1.1.1
  shelf_router: ^1.1.4
  shelf: ^1.4.2
  path: ^1.9.1
  markdown: ^7.3.1
  mustache_template: ^2.0.4
  shelf_static: ^1.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_version: ^2.1.1
  build_runner: ^2.4.9
  injectable_generator: ^2.6.2
  msix: ^3.16.1
  mocktail: ^1.0.4
  flutter_hooks_test: ^2.0.0

dependency_overrides:
  package_info_plus: ^4.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/sounds/Piano.sf2
    - CHANGELOG.md
    - web/icons/Icon-192.png
